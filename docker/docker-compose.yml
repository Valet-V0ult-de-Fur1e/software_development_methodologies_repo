services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: shoe_store
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d shoe_store"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - db
          - postgres

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_:/data
    networks:
      default:
        aliases:
          - minio

  migrate:
    build:
      context: ../backend
    depends_on:
      db:
        condition: service_healthy 
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/shoe_store
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    command: alembic upgrade head

  backend:
    build:
      context: ../backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/shoe_store
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_:
  minio_:

networks:
  default:
    driver: bridge